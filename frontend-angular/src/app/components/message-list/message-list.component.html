<div style="flex:1;overflow-y:auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:0.15rem">
  @for (msg of messages; track msg.id; let i = $index) {
    @if (msg.kind === 'system') {
      <div style="align-self:center;font-size:0.7rem;color:var(--muted);padding:0.2rem 0.8rem;border-radius:999px;border:1px solid var(--border);margin:0.5rem 0">
        {{ msg.text }}
      </div>
    } @else {
      <div [style.align-items]="msg.username === currentUser ? 'flex-end' : 'flex-start'"
           [style.align-self]="msg.username === currentUser ? 'flex-end' : 'flex-start'"
           [style.margin-top]="isGrouped(i) ? '0' : '0.75rem'"
           style="display:flex;flex-direction:column;max-width:72%">
        @if (!isGrouped(i)) {
          <div [style.color]="msg.username === currentUser ? 'var(--accent)' : 'var(--muted)'"
               [style.opacity]="msg.username === currentUser ? 0.7 : 1"
               style="font-size:0.65rem;margin-bottom:0.25rem;padding:0 0.5rem">
            {{ msg.username }} · {{ formatTime(msg.timestamp) }}
          </div>
        }
        <div [style.background]="isMentioned(msg) ? '#ff994410' : msg.username === currentUser ? '#00e5a018' : 'var(--surface)'"
             [style.border]="isMentioned(msg) ? '1px solid #ff994450' : msg.username === currentUser ? '1px solid #00e5a035' : '1px solid var(--border)'"
             [style.border-bottom-right-radius]="msg.username === currentUser ? '2px' : '6px'"
             [style.border-bottom-left-radius]="msg.username === currentUser ? '6px' : '2px'"
             style="padding:0.6rem 0.9rem;border-radius:6px;font-size:0.88rem;line-height:1.55;word-break:break-word;white-space:pre-wrap">
          <span [innerHTML]="renderText(msg.text, currentUser)"></span>
          @if (isMentioned(msg)) {
            <span style="margin-left:6px;font-size:0.65rem;color:#ff9944;font-weight:700">◀ you</span>
          }
        </div>
      </div>
    }
  }
  <div #bottom></div>
</div>
