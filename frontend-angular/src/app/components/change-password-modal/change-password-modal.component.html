<div (click)="closeIfBackdrop($event)"
     style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;width:min(380px,92vw);display:flex;flex-direction:column;gap:1rem">

    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-family:var(--display);font-weight:800;font-size:1rem;color:var(--text)">Change Password</div>
      <button (click)="closed.emit()" style="background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer">✕</button>
    </div>

    <div>
      <div style="font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.3rem">Current password</div>
      <input type="password" [(ngModel)]="current" autofocus (keydown.enter)="handleSubmit()"
             style="width:100%;padding:0.65rem 0.9rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:0.9rem;outline:none;box-sizing:border-box" />
    </div>

    <div>
      <div style="font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.3rem">New password</div>
      <input type="password" [(ngModel)]="next" placeholder="Min. 6 characters" (keydown.enter)="handleSubmit()"
             style="width:100%;padding:0.65rem 0.9rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:0.9rem;outline:none;box-sizing:border-box" />
    </div>

    <div>
      <div style="font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.3rem">Confirm new password</div>
      <input type="password" [(ngModel)]="confirm" (keydown.enter)="handleSubmit()"
             style="width:100%;padding:0.65rem 0.9rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:0.9rem;outline:none;box-sizing:border-box" />
    </div>

    @if (error) { <div style="color:#e55;font-size:0.78rem">{{ error }}</div> }
    @if (info)  { <div style="color:var(--accent);font-size:0.78rem">{{ info }}</div> }

    <button (click)="handleSubmit()" [disabled]="loading"
            [style.opacity]="loading ? 0.7 : 1"
            [style.cursor]="loading ? 'not-allowed' : 'pointer'"
            style="padding:0.7rem;background:var(--accent);color:#000;font-family:var(--display);font-weight:700;font-size:0.88rem;border:none;border-radius:6px">
      {{ loading ? 'Updating…' : 'Update password' }}
    </button>

  </div>
</div>
